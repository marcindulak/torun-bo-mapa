    <script>
        const GDPR_CONSENT_EXPIRY_MS =  7 * 24 * 60 * 60 * 1000; // 7 days

        function acceptGdpr() {
            const expiryTime = Date.now() + GDPR_CONSENT_EXPIRY_MS;
            localStorage.setItem('gdpr-consent', JSON.stringify({ accepted: true, expiryTime }));
            document.getElementById('gdpr-banner').classList.add('hidden');
            window.initializeMap();
        }

        function rejectGdpr() {
            // Banner stays visible; user must accept to use the map
        }

        function isConsentValid() {
            const consentData = localStorage.getItem('gdpr-consent');
            if (!consentData) return false;

            try {
                const { accepted, expiryTime } = JSON.parse(consentData);
                return accepted && Date.now() < expiryTime;
            } catch {
                return false;
            }
        }
    </script>
    <script type="module">
        import { Map, TileLayer, Marker, DivIcon, Control, Rectangle, DivOverlay, Polygon } from 'https://unpkg.com/leaflet@2.0.0-alpha.1/dist/leaflet.js';

        // Seeded random number generator for deterministic game
        // Returns a function that generates the next random number in the sequence
        // Global flag to control RNG behavior: true = deterministic (same game every reload),
        // false = randomized (different game on each reload)
        const DETERMINISTIC_GAME = false;

        function createSeededRandom(initialSeed) {
            let seed = initialSeed;
            return function next() {
                seed = (seed * 9301 + 49297) % 233280;
                return seed / 233280;
            };
        }

        function createUnseededRandom() {
            return function next() {
                return Math.random();
            };
        }

        // Map instance - shared globally for all functions
        let map = null;

        // Game state
        let gameState = {
            active: false,
            currentLocationIndex: 0,
            selectedLocations: [],
            currentLocation: null,
            currentQuestionType: 'project',
            score: 0,
            phase: 'question',
            resultTimeoutId: null,
            rng: null,
            highlightedMarker: null,
            menuWasCollapsed: false,
            escListenerController: null
        };

        // Map state
        let currentMarkers = [];
        let currentClusterBoxes = [];
        let currentClusters = [];
        let acceptanceFilter = { accepted: true, rejected: false };
        // Empty string means no filter; any non-empty value narrows markers to matching projects.
        let searchQuery = '';
        let currentYear; // Will be set to latest year from AVAILABLE_YEARS after DATA_BY_YEAR is loaded
        let minCost, maxCost;

        // Helper function to calculate distance between two points (Haversine)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Get closest projects in the same category, supplement from other categories if needed
        function getClosestInCategory(location, allLocations, count = 3) {
            const sameCategory = allLocations.filter(l =>
                l.category === location.category && l.accepted && l !== location
            );

            const withDistance = sameCategory.map(l => ({
                ...l,
                distance: calculateDistance(location.lat, location.lon, l.lat, l.lon)
            }));

            withDistance.sort((a, b) => a.distance - b.distance);

            let choices = [location, ...withDistance.slice(0, count - 1)];

            // If we need more choices from other categories
            if (choices.length < count) {
                const otherCategories = allLocations.filter(l =>
                    l.category !== location.category && l.accepted && l !== location
                );

                const otherWithDistance = otherCategories.map(l => ({
                    ...l,
                    distance: calculateDistance(location.lat, location.lon, l.lat, l.lon)
                }));

                otherWithDistance.sort((a, b) => a.distance - b.distance);
                choices = choices.concat(otherWithDistance.slice(0, count - choices.length));
            }

            // Shuffle choices so correct answer appears in random position
            return shuffleArray(choices.slice(0, count), gameState.rng);
        }

        // Shuffle array with seeded RNG
        function shuffleArray(array, rng) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(rng() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Format cost with thousand separators
        function formatCost(cost) {
            return Number(cost).toLocaleString('pl-PL');
        }

        // Categorize cost into three ranges
        function categorizeCost(cost) {
            const numCost = Number(cost);
            if (numCost < 100000) return 'mniej niż 100,000';
            if (numCost <= 500000) return 'między 100,000 i 500,000';
            return 'powyżej 500,000';
        }


        /*
         * Lowercases and strips Unicode combining diacritics (NFD decomposition
         * then removal of combining-mark range U+0300–U+036F).
         * "ż" → "z", "ą" → "a", etc., so a query "budze" matches "budżet".
         * The base letter is always preserved; only the accent mark is dropped.
         */
        function normalizeText(text) {
            return text.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
        }

        // Select 5 random accepted locations
        function selectRandomLocations(allLocations) {
            const accepted = allLocations.filter(l => l.accepted);
            gameState.rng = DETERMINISTIC_GAME ? createSeededRandom(42) : createUnseededRandom();
            return shuffleArray(accepted, gameState.rng).slice(0, 5);
        }

        // Start game mode
        function startGameMode() {
            gameState.active = true;
            gameState.currentLocationIndex = 0;
            gameState.score = 0;
            gameState.phase = 'question';
            gameState.currentQuestionType = 'project';
            gameState.previousFocusElement = document.activeElement;

            const allLocations = DATA_BY_YEAR[currentYear];
            gameState.selectedLocations = selectRandomLocations(allLocations);

            // Collapse menu on mobile for better visibility and hide toggle during game
            const menuContent = document.querySelector('.menu-content');
            if (menuContent) {
                gameState.menuWasCollapsed = menuContent.classList.contains('collapsed');
                menuContent.classList.add('collapsed');
                // Performance improvement: Find toggle button without converting NodeList to Array.
                // Iterate directly using a for loop instead of Array.from + find pattern.
                const toggleButtons = document.querySelectorAll('.year-selector .toggle-button');
                let menuToggle = null;
                for (let i = 0; i < toggleButtons.length; i++) {
                    if (!toggleButtons[i].id) {
                        menuToggle = toggleButtons[i];
                        break;
                    }
                }
                if (menuToggle) {
                    menuToggle.innerHTML = 'Rozwiń menu ▼';
                    menuToggle.style.display = 'none';
                }
            }

            const searchGroupEl = document.getElementById('search-group');
            if (searchGroupEl) searchGroupEl.style.display = 'none';

            updateGameButton();
            showGameQuestion();
            blockMapInteraction();
        }

        // Block marker popups during game
        function blockMapInteraction() {
            if (map && currentMarkers) {
                currentMarkers.forEach(marker => {
                    if (marker.unbindPopup) {
                        marker.unbindPopup();
                    }
                });
            }
        }

        // Re-enable map interaction after game
        function unblockMapInteraction() {
            // Reload markers to restore popups
            if (map) {
                loadYear(currentYear);
            }
        }

        // Clear the previous marker highlight and restore its original appearance
        // Only updates the icon if the new marker is different to avoid flash
        function clearPreviousHighlight(newMarker) {
            if (gameState.highlightedMarker && gameState.highlightedMarker._originalUpdateIcon) {
                gameState.highlightedMarker.updateIcon = gameState.highlightedMarker._originalUpdateIcon;
                // Only update icon if switching to a different marker
                // Same marker = transitioning from project to cost question for same location
                if (gameState.highlightedMarker !== newMarker) {
                    gameState.highlightedMarker.updateIcon();
                }
            }
        }

        // Create a highlighted icon with red glow effect
        function createHighlightedIcon(marker, size) {
            const icon = CATEGORY_ICONS[marker.location.category] || '📍';
            return new DivIcon({
                html: `<div style="font-size: ${size}px; line-height: 1; text-align: center; filter: drop-shadow(0 0 4px #FF0000) drop-shadow(0 0 8px #FF6666); text-shadow: 0 0 3px #FF0000;">${icon}</div>`,
                className: '',
                iconSize: [size, size],
                iconAnchor: [size / 2, size / 2]
            });
        }

        // Zoom to a marker and update its icon after zoom completes
        function zoomToMarker(marker) {
            if (!map) return;

            const onZoomEnd = () => {
                marker.updateIcon();
                map.off('zoomend', onZoomEnd);
                clearTimeout(fallbackTimeout);
            };
            map.on('zoomend', onZoomEnd);

            // Fallback: update icon even if zoomend doesn't fire (when already at target zoom)
            const fallbackTimeout = setTimeout(() => {
                marker.updateIcon();
                map.off('zoomend', onZoomEnd);
            }, 300);

            map.setView([marker.location.lat, marker.location.lon], 15);
        }

        // Highlight the current project marker on the map
        function highlightCurrentLocation() {
            // Find the marker for the current location by name (coordinates may be adjusted by gridArrangeCloseMarkers)
            const marker = currentMarkers.find(m =>
                m.location &&
                m.location.name === gameState.currentLocation.name
            );

            if (marker) {
                // Clear previous highlight, passing new marker to avoid flash if same marker
                clearPreviousHighlight(marker);

                // Store original updateIcon function so we can restore it later
                marker._originalUpdateIcon = marker.updateIcon;

                // Create a wrapper that preserves the glow effect
                // Use MAX_RADIUS for uniform size during quiz to avoid revealing cost
                marker.updateIcon = () => {
                    const zoom = map.getZoom();
                    const zoomScale = Math.pow(MARKER_ZOOM_SCALE_FACTOR, zoom - MAP_ZOOM);
                    const size = MAX_RADIUS * zoomScale;
                    const highlightedIcon = createHighlightedIcon(marker, size);
                    marker.setIcon(highlightedIcon);
                };

                gameState.highlightedMarker = marker;
                zoomToMarker(marker);
            } else {
                console.log('Marker not found for:', gameState.currentLocation.name);
            }
        }

        // Get or create the game overlay element
        function getOrCreateGameOverlay() {
            let overlay = document.getElementById('game-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'game-overlay';
                overlay.className = 'game-overlay';
                document.body.appendChild(overlay);
            }
            return overlay;
        }

        // Create the game container with header and score
        function createGameContainer() {
            const container = document.createElement('div');
            container.className = 'game-container';

            const header = document.createElement('div');
            header.className = 'game-header';
            const scoreDiv = document.createElement('div');
            scoreDiv.className = 'game-score';
            scoreDiv.setAttribute('role', 'status');
            scoreDiv.setAttribute('aria-live', 'polite');
            scoreDiv.textContent = `Wynik: ${gameState.score}/10`;
            header.appendChild(scoreDiv);
            container.appendChild(header);

            return container;
        }

        // Create project question UI elements
        function createProjectQuestion(container, allLocations) {
            const questionHeader = document.createElement('div');
            questionHeader.className = 'game-question-header';

            const question = document.createElement('div');
            question.className = 'game-question';
            const questionNumber = gameState.currentLocationIndex + 1;
            question.textContent = `Jaki to projekt? (Test ${questionNumber}/5)`;

            const buttonContainer = document.createElement('div');
            buttonContainer.className = 'game-question-button';
            buttonContainer.id = 'question-button-container';

            questionHeader.appendChild(question);
            questionHeader.appendChild(buttonContainer);
            container.appendChild(questionHeader);

            const projectInfo = document.createElement('div');

            projectInfo.appendChild(document.createTextNode(' ' + categoryName));

        // Create cost question UI elements
        function createCostQuestion(container) {
            const questionHeader = document.createElement('div');
            questionHeader.className = 'game-question-header';

            const question = document.createElement('div');
            question.className = 'game-question';
            question.textContent = 'Koszt projektu?';

            const projectInfo = document.createElement('div');
            projectInfo.style.marginBottom = '4px';
            projectInfo.style.fontSize = '14px';
            projectInfo.style.color = '#666';
            // Use DOM nodes instead of innerHTML to avoid XSS via data-origin project name strings.
            const projectLabel = document.createElement('strong');
            projectLabel.textContent = 'Projekt:';
            projectInfo.appendChild(projectLabel);
            projectInfo.appendChild(document.createTextNode(' ' + gameState.currentLocation.name));

            const costRanges = [

                { label: 'średni', value: 'między 100,000 i 500,000' },

            ];

            const answersDiv = document.createElement('div');

            costRanges.forEach((range) => {

                label.appendChild(radio);
                label.appendChild(document.createTextNode(range.label));

            // Height is set to accommodate the larger 16px bold font that will be displayed
            const costPlaceholder = document.createElement('div');

            costPlaceholder.style.visibility = 'hidden';

        // Setup overlay click and ESC key handlers
        function setupGameOverlayHandlers(overlay) {
            overlay.onclick = (e) => {
                if (e.target === overlay) {
                    exitGame();
                }
            };

            // Clean up previous ESC listener if it exists
            if (gameState.escListenerController) {
                gameState.escListenerController.abort();
            }

            // Create new AbortController for ESC key listener
            const controller = new AbortController();
            gameState.escListenerController = controller;

            const handleEsc = (e) => {
                if (e.key === 'Escape') {
                    exitGame();
                }
            };
            document.addEventListener('keydown', handleEsc, { signal: controller.signal });
        }

        // Display current question
        function showGameQuestion() {
            if (gameState.currentLocationIndex >= 5) {
                endGame();
                return;
            }

            gameState.currentLocation = gameState.selectedLocations[gameState.currentLocationIndex];
            const allLocations = DATA_BY_YEAR[currentYear];

            // Highlight the current location on the map (use setTimeout to ensure markers are ready)
            setTimeout(() => {
                highlightCurrentLocation();
            }, 100);

            const overlay = getOrCreateGameOverlay();
            const container = createGameContainer();

            if (gameState.currentQuestionType === 'project') {
                createProjectQuestion(container, allLocations);
            } else {
                createCostQuestion(container);
            }

            overlay.innerHTML = '';
            overlay.appendChild(container);
            // Performance improvement: Cache game answer labels after rendering.
            // This avoids repeated DOM queries in handleProjectAnswer and handleCostAnswer.
            gameState.currentLabels = container.querySelectorAll('.game-answer-label');
            setupGameOverlayHandlers(overlay);
        }

        // Add "Następne" button to advance to next question
        function addNextButton(onClickFn) {
            const buttonContainer = document.getElementById('question-button-container');
            if (!buttonContainer) return;

            const nextBtn = document.createElement('button');
            nextBtn.textContent = 'Następne';
            nextBtn.className = 'game-button';
            nextBtn.style.width = '100%';
            nextBtn.style.height = '100%';
            nextBtn.style.margin = '0';
            nextBtn.style.padding = '0';
            nextBtn.onclick = () => {
                // Clear the timeout so it doesn't trigger after button click
                if (gameState.resultTimeoutId) {
                    clearTimeout(gameState.resultTimeoutId);
                }
                onClickFn();
            };
            buttonContainer.appendChild(nextBtn);
        }

        // Handle project answer
        function handleProjectAnswer(selectedProject) {
            const isCorrect = selectedProject === gameState.currentLocation;
            if (isCorrect) {
                gameState.score++;
            }

            // Highlight answers
            // Performance improvement: Use cached labels instead of querying DOM.
            // Labels were cached in showGameQuestion() after rendering.
            const labels = gameState.currentLabels;
            labels.forEach(label => {
                const radio = label.querySelector('input[type="radio"]');
                radio.disabled = true;

                const labelText = label.textContent.trim();
                if (labelText === gameState.currentLocation.name) {
                    // This is the correct answer
                    label.classList.add('correct');
                } else if (!isCorrect && labelText === selectedProject.name) {
                    // User selected this (wrong) answer
                    label.classList.add('incorrect');
                }
            });

            // Add "Następne" button to advance
            addNextButton(() => {
                gameState.currentQuestionType = 'cost';
                showGameQuestion();
            });

            gameState.resultTimeoutId = setTimeout(() => {
                gameState.currentQuestionType = 'cost';
                showGameQuestion();
            }, 8000);
        }

        // Handle cost answer
        function handleCostAnswer(selectedRange) {
            const correctRange = categorizeCost(gameState.currentLocation.cost);
            const isCorrect = selectedRange === correctRange;
            if (isCorrect) {
                gameState.score++;
            }

            // Highlight answers
            // Performance improvement: Use cached labels instead of querying DOM.
            // Labels were cached in showGameQuestion() after rendering.
            const labels = gameState.currentLabels;
            labels.forEach(label => {
                const radio = label.querySelector('input[type="radio"]');
                radio.disabled = true;

                if (radio.value === selectedRange) {
                    // This is the selected answer
                    if (isCorrect) {
                        label.classList.add('correct');
                    } else {
                        label.classList.add('incorrect');
                    }
                } else if (radio.value === correctRange) {
                    // This is the correct answer (show even if user selected wrong)
                    label.classList.add('correct');
                }
            });

            // Display actual cost after answer is given
            const costPlaceholder = document.querySelector('.cost-placeholder');
            if (costPlaceholder) {
                costPlaceholder.style.visibility = 'visible';
                costPlaceholder.style.color = '#333';
                costPlaceholder.style.textAlign = 'center';
                costPlaceholder.textContent = `Koszt: ${formatCost(gameState.currentLocation.cost)} zł`;
            }

            // Add "Następne" button to advance
            addNextButton(() => {
                gameState.currentLocationIndex++;
                gameState.currentQuestionType = 'project';
                showGameQuestion();
            });

            gameState.resultTimeoutId = setTimeout(() => {
                gameState.currentLocationIndex++;
                gameState.currentQuestionType = 'project';
                showGameQuestion();
            }, 8000);
        }

        // End game
        function endGame() {
            gameState.active = false;

            // Clear any pending result timeout
            if (gameState.resultTimeoutId) {
                clearTimeout(gameState.resultTimeoutId);
                gameState.resultTimeoutId = null;
            }

            let overlay = document.getElementById('game-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'game-overlay';
                overlay.className = 'game-overlay';
                document.body.appendChild(overlay);
            }

            const container = document.createElement('div');
            container.className = 'game-container game-over-screen';
            container.setAttribute('role', 'alert');
            container.setAttribute('aria-live', 'assertive');

            const message = document.createElement('div');
            message.className = 'game-over-message';
            message.textContent = 'Twój wynik';
            container.appendChild(message);

            button.className = 'game-button';

            overlay.innerHTML = '';

        // Create confetti animation
        function createConfetti() {
            const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F'];
            const container = document.querySelector('.game-container');

            if (!container) return;

            // Create 50 confetti particles, staggered every 100ms over 5 seconds for cascading effect
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';

                    // HORIZONTAL SPREAD: Each particle is positioned at a random left position (0-100%)
                    // to spread particles horizontally across the full width of the container.
                    // The left positioning creates the horizontal distribution visible to the user.
                    const left = Math.random() * 100;

                    // ANIMATION PARAMETERS: Each particle gets randomized properties that control
                    // its unique behavior throughout the animation.
                    const opacity = 0.6 + Math.random() * 0.4;
                    const duration = 2.5 + Math.random() * 2.5;           // Animation duration: 2.5-5 seconds
                    const burstHeight = 20 + Math.random() * 30;          // Upward distance: 20-50% of container
                    const drift = (Math.random() - 0.5) * 40;             // Horizontal drift: ±20% during fall
                    const rotation = Math.random() * 720;                 // Total rotation: 0-720 degrees

                    confetti.style.position = 'absolute';
                    confetti.style.left = left + '%';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

                    // Pass animation parameters as CSS custom properties to the 'burst' keyframe
                    confetti.style.setProperty('--opacity', opacity);
                    confetti.style.setProperty('--duration', duration + 's');
                    confetti.style.setProperty('--burst-height', burstHeight + '%');
                    confetti.style.setProperty('--drift', drift + '%');
                    confetti.style.setProperty('--rotation', rotation);

                    // ANIMATION BEHAVIOR (defined in @keyframes burst):
                    // - 0%: Particle starts at top: 0% with opacity: 0 (invisible at container top)
                    //   The opacity: 0 hides an artifact that would otherwise show all particles as
                    //   a horizontal line at the top before animation starts.
                    // - 30%: Particle moves upward to top: calc(0% - burst-height), which places it
                    //   above the visible container (negative top values). Becomes visible (opacity: var(--opacity)).
                    //   Rotation begins (partial rotation applied at this point).
                    // - 100%: Particle falls down to top: 100% (bottom of container), fades out (opacity: 0).
                    //   Full rotation and horizontal drift applied via translateX. Particle ends invisible below container.
                    // The 'ease-out' timing function makes the upward burst quick, then progressively slower
                    // descent for natural falling physics. 'forwards' fill keeps the final invisible state.
                    confetti.style.animation = `burst var(--duration) ease-out forwards`;

                    container.appendChild(confetti);

                    // Remove particle from DOM after animation completes to prevent memory buildup
                    setTimeout(() => confetti.remove(), duration * 1000);
                }, (i / 50) * 100);
            }
        }

        // Exit game
        function exitGame() {
            gameState.active = false;

            // Clear any pending result timeout to stop the counter
            if (gameState.resultTimeoutId) {
                clearTimeout(gameState.resultTimeoutId);
                gameState.resultTimeoutId = null;
            }

            // Clean up ESC key listener
            if (gameState.escListenerController) {
                gameState.escListenerController.abort();
                gameState.escListenerController = null;
            }

            // Update button visibility BEFORE removing overlay to ensure proper state
            updateGameButton();

            const overlay = document.getElementById('game-overlay');
            if (overlay) {
                overlay.remove();
            }

            // Restore menu to previous state and show toggle button
            const menuContent = document.querySelector('.menu-content');
            if (menuContent) {
                // Performance improvement: Find toggle button without converting NodeList to Array.
                // Iterate directly using a for loop instead of Array.from + find pattern.
                const toggleButtons = document.querySelectorAll('.year-selector .toggle-button');
                let menuToggle = null;
                for (let i = 0; i < toggleButtons.length; i++) {
                    if (!toggleButtons[i].id) {
                        menuToggle = toggleButtons[i];
                        break;
                    }
                }
                if (menuToggle) {
                    menuToggle.style.display = 'block';
                }

                if (!gameState.menuWasCollapsed) {
                    menuContent.classList.remove('collapsed');
                    if (menuToggle) {
                        menuToggle.innerHTML = 'Zwiń menu ▲';
                    }
                }
            }

            unblockMapInteraction();

            const searchGroupEl = document.getElementById('search-group');
            if (searchGroupEl) searchGroupEl.style.display = '';

            // updateGameButton() (called above) unconditionally shows gameBtn.
            // If the menu ended up collapsed after restore, hide it again to stay
            // consistent with the rule that gameBtn is hidden when menu is collapsed.
            const menuContentEl = document.querySelector('.menu-content');
            const gameBtnEl = document.getElementById('game-btn');
            if (menuContentEl && gameBtnEl && menuContentEl.classList.contains('collapsed')) {
                gameBtnEl.style.display = 'none';
            }

            // WCAG 2.1.2: Restore focus to element that triggered game
            if (gameState.previousFocusElement && gameState.previousFocusElement.focus) {
                gameState.previousFocusElement.focus();
            }
        }

        // Update game button visibility
        function updateGameButton() {
            const gameBtn = document.getElementById('game-btn');
            const endBtn = document.getElementById('end-game-btn');

            if (gameState.active) {
                // Game is active: hide start button, show end button
                if (gameBtn) gameBtn.style.display = 'none';
                if (endBtn) endBtn.style.display = 'block';
            } else {
                // Game is not active: show start button, hide end button
                if (gameBtn) gameBtn.style.display = 'block';
                if (endBtn) endBtn.style.display = 'none';
            }
        }

        // CSS animation for confetti
        if (!document.getElementById('confetti-style')) {
            const style = document.createElement('style');
            style.id = 'confetti-style';
            style.textContent = `
                @keyframes burst {
                    0% {
                        top: 0%;
                        opacity: 0;
                        transform: translateX(0) rotate(0deg);
                    }
                    30% {
                        top: calc(0% - var(--burst-height));
                        opacity: var(--opacity);
                        transform: translateX(0) rotate(calc(var(--rotation) * 0.3));
                    }
                    100% {
                        top: 100%;
                        opacity: 0;
                        transform: translateX(var(--drift)) rotate(var(--rotation));
                    }
                }
            `;
            document.head.appendChild(style);
        }

                acceptedLabel.htmlFor = 'filter-accepted';
                const acceptedCheckbox = document.createElement('input');
                acceptedCheckbox.type = 'checkbox';
                acceptedCheckbox.id = 'filter-accepted';
                acceptedCheckbox.checked = acceptanceFilter.accepted;
                acceptedCheckbox.onchange = (e) => {
                    acceptanceFilter.accepted = e.target.checked;
                    if (!acceptanceFilter.accepted && !acceptanceFilter.rejected) {
                        acceptanceFilter.rejected = true;
                        rejectedCheckbox.checked = true;
                    }
                    loadYear(currentYear);
                };
                acceptedLabel.appendChild(acceptedCheckbox);
                acceptedLabel.appendChild(document.createTextNode('Przyjęty'));
                statusGroup.appendChild(acceptedLabel);

                const rejectedLabel = document.createElement('label');
                rejectedLabel.htmlFor = 'filter-rejected';
                const rejectedCheckbox = document.createElement('input');
                rejectedCheckbox.type = 'checkbox';
                rejectedCheckbox.id = 'filter-rejected';
                rejectedCheckbox.checked = acceptanceFilter.rejected;
                rejectedCheckbox.onchange = (e) => {
                    acceptanceFilter.rejected = e.target.checked;
                    if (!acceptanceFilter.accepted && !acceptanceFilter.rejected) {
                        acceptanceFilter.accepted = true;
                        acceptedCheckbox.checked = true;
                    }
                    loadYear(currentYear);
                };
                rejectedLabel.appendChild(rejectedCheckbox);
                rejectedLabel.appendChild(document.createTextNode('Odrzucony'));
                statusGroup.appendChild(rejectedLabel);

                menuContent.appendChild(statusGroup);
                container.appendChild(menuContent);

                // Text search input: filters visible markers by project name, address,
                // or description within the currently active year and acceptance filter.
                // Live search fires on every keystroke on all devices.
                // On mobile the "Szukaj" button additionally blurs the input, which
                // dismisses the soft keyboard and reveals the map with current results.
                const searchGroup = document.createElement('div');
                searchGroup.id = 'search-group';
                searchGroup.className = 'control-group';
                const searchInput = document.createElement('input');
                searchInput.type = 'text';
                searchInput.id = 'search-input';
                searchInput.placeholder = 'Wpisz szukane słowo';
                searchInput.setAttribute('aria-label', 'Wpisz szukane słowo');
                searchInput.addEventListener('input', () => {
                    searchQuery = searchInput.value;
                    loadYear(currentYear);
                });

                const searchBtn = document.createElement('button');
                searchBtn.id = 'search-btn';
                searchBtn.className = 'toggle-button';
                searchBtn.textContent = 'Szukaj';
                searchBtn.setAttribute('aria-label', 'Szukaj');
                searchBtn.addEventListener('click', () => {
                    searchQuery = searchInput.value;
                    loadYear(currentYear);
                    // Blur dismisses the soft keyboard on mobile, uncovering the map.
                    searchInput.blur();
                });

                searchGroup.appendChild(searchInput);
                searchGroup.appendChild(searchBtn);
                container.appendChild(searchGroup);

                // Game mode buttons (placed before toggleButton to appear above it)
                const gameBtn = document.createElement('button');
                gameBtn.id = 'game-btn';
                gameBtn.className = 'toggle-button';
                gameBtn.textContent = 'Sprawdź Swoją Wiedzę!';
                gameBtn.onclick = startGameMode;
                container.appendChild(gameBtn);

                const endGameBtn = document.createElement('button');
                endGameBtn.id = 'end-game-btn';
                endGameBtn.className = 'toggle-button';
                endGameBtn.textContent = 'Zakończ grę';
                endGameBtn.onclick = exitGame;
                endGameBtn.style.display = 'none';
                container.appendChild(endGameBtn);

                const toggleButton = document.createElement('button');
                toggleButton.className = 'toggle-button';
                toggleButton.innerHTML = 'Zwiń menu ▲';
                toggleButton.onclick = () => {
                    const isCollapsed = menuContent.classList.toggle('collapsed');
                    toggleButton.innerHTML = isCollapsed ? 'Rozwiń menu ▼' : 'Zwiń menu ▲';
                    // Hide the game button when the menu is collapsed so it does not
                    // appear to float without context. Only affects the non-game state;
                    // during a game, updateGameButton already keeps gameBtn hidden.
                    if (!gameState.active) {
                        gameBtn.style.display = isCollapsed ? 'none' : 'block';
                    }
                };
                container.appendChild(toggleButton);

                // Workaround: Lock container width after initial layout to prevent horizontal
                // shift when menu collapses. The browser's shrink-to-fit algorithm recalculates
                // width differently when max-height:0 is applied, causing expansion.
                requestAnimationFrame(() => {
                    container.style.width = container.getBoundingClientRect().width + 'px';
                });

                return container;
            }
        });

        window.initializeMap = function initializeMap() {
            // Using default SVG renderer for proper shape rendering (opacity, borders)
            // SVG has negligible performance impact with ~150 markers
            if (map) {
                map.remove();
            }
            currentMarkers = [];
            map = new Map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView(MAP_CENTER, MAP_ZOOM);

            // Performance optimizations for tile loading:
            // - maxZoom: 18 prevents loading overly detailed tiles while keeping street names visible
            // - updateWhenIdle: true defers tile loading until after pan/zoom completes, reducing requests
            // - keepBuffer: 2 reduces off-screen tile loading to 2 screens instead of default 3
            new TileLayer(TILE_LAYER_URL, {
                attribution: TILE_LAYER_ATTRIBUTION,
                minZoom: 11,
                maxZoom: 18,
                updateWhenIdle: true,
                keepBuffer: 2
            }).addTo(map);

            // Add controls to bottom right (added in reverse order - attribution at bottom)
            new Control.Attribution({
                position: 'bottomright',
                prefix: false
            }).addTo(map);

            new Control.Scale({
                position: 'bottomright',
                imperial: false,
                metric: true
            }).addTo(map);
            new Control.Zoom({ position: 'bottomright' }).addTo(map);

            new YearSelector().addTo(map);
            loadYear(currentYear);

            map.on('popupopen', (e) => {
                const popup = e.popup;
                const el = popup.getElement();
                if (!el) return;
                el.querySelector('.leaflet-popup-tip-container')?.remove();
                popup.options.offset = [0, el.offsetHeight + 6];
                popup.update();
                const marker = popup._source;
                if (marker && marker.location) {
                    const div = marker.getElement()?.querySelector('div');
                    if (div) div.style.filter = 'drop-shadow(0 0 4px #FF0000) drop-shadow(0 0 8px #FF6666)';
                }
            });

            map.on('popupclose', (e) => {
                const marker = e.popup._source;
                if (marker && marker.location) {
                    const div = marker.getElement()?.querySelector('div');
                    if (div) div.style.filter = '';
                }
            });

            map.on('zoomend', () => {
                currentMarkers.forEach(marker => {
                    if (marker.updateIcon) {
                        marker.updateIcon();
                    }
                });
                updateClusterBoxes();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    map.closePopup();
                }
            });

            map.on('click', () => {
                map.closePopup();
            });
        };

        // Check GDPR consent on page load and initialize map if valid
        if (isConsentValid()) {
            initializeMap();
        }
    </script>
</head>
<body>
    <a href="#controls" class="skip-link">Przejdź do menu</a>
    <div id="gdpr-banner">
        <div>Aby korzystać z mapy, naciśnij przycisk 'Akceptuj tylko niezbędne'. To pozwala OpenStreetMap zbierać dane potrzebne do działania usługi. <a href="https://osmfoundation.org/wiki/Privacy_Policy" target="_blank">Polityka prywatności</a></div>
        <div style="display: flex; gap: 8px; justify-content: center;">
            <button onclick="acceptGdpr()">Akceptuj tylko niezbędne</button>
            <button onclick="rejectGdpr()">Odrzuć wszystko</button>
        </div>
    </div>
    <script>
        // Hide banner immediately if consent is valid
        const consentData = localStorage.getItem('gdpr-consent');
        if (consentData) {
            try {
                const { accepted, expiryTime } = JSON.parse(consentData);
                if (accepted && Date.now() < expiryTime) {
                    document.getElementById('gdpr-banner').classList.add('hidden');
                }
            } catch (e) {}
        }
    </script>
    <div id="unofficial-watermark" aria-hidden="true">Wersja nieoficjalna</div>
    <div id="map"></div>
</body>
</html>
